<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <!-- Allow pinch-zoom (a11y). Inputs are 16px so iOS won't auto-zoom on focus. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ffffff" id="themeColor" />
  <title>Reys hisoboti</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- Top bar: actions row on top, centered tabs below -->
  <header class="topbar">
    <div class="topbar__actions">
      <span class="topbar__brand" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="m12 2 8 4v12l-8 4-8-4V6l8-4Zm0 2.2L6.5 7 12 9.8 17.5 7 12 4.2ZM6 8.7v8.1l5 2.5v-8.1L6 8.7Zm7 10.6 5-2.5V8.7l-5 2.6v8Z"/></svg>
      </span>
      <button type="button" class="theme-btn" id="activityBtn" aria-label="Faolligim">
        <svg viewBox="0 0 24 24" class="ic"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm1-13h-2v6l5 3 .9-1.6-3.9-2.3V7Z"/></svg>
      </button>
      <button type="button" class="theme-btn" id="passkeyAddBtn" aria-label="Passkey o'rnatish" hidden>
        <svg viewBox="0 0 24 24" class="ic"><path d="M14 2a6 6 0 0 0-5.6 8.2L2 16.6V22h5.4l1.2-1.2 1.4-1.4-1.2-1.2 1.6-1.6 1.4 1.4 1.6-1.6A6 6 0 1 0 14 2Zm2.5 5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/></svg>
      </button>
      <button type="button" class="theme-btn" id="themeBtn" aria-label="Mavzu"></button>
    </div>
    <nav class="tabs" role="tablist" aria-label="Bo'limlar">
      <button class="tab is-active" role="tab" data-tab="report" aria-selected="true">Reys hisoboti</button>
      <button class="tab" role="tab" data-tab="lost" aria-selected="false">Adashgan yuklar</button>
    </nav>
  </header>

  <main class="content">
    <!-- ============ TAB 1: REYS HISOBOTI ============ -->
    <section class="panel is-active" id="panel-report" role="tabpanel">
      <!-- Photos -->
      <div class="field">
        <div class="field__head">
          <span class="field__label">Rasmlar</span>
          <span class="counter" id="photoCounter">0/10</span>
        </div>

        <div class="photo-grid" id="photoGrid"></div>

        <div class="photo-actions">
          <button type="button" class="btn btn--ghost" id="btnGallery">
            <svg viewBox="0 0 24 24" class="ic"><path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2ZM8.5 11l2.5 3 3.5-4.5L19 16H5l3.5-5Z"/></svg>
            Galereya
          </button>
          <button type="button" class="btn btn--ghost" id="btnCamera">
            <svg viewBox="0 0 24 24" class="ic"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Zm0-2a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4ZM9 3 7.2 5H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 3H9Z"/></svg>
            Kamera
          </button>
        </div>

        <!-- Visually hidden (NOT display:none) so the camera `capture` hint is honored. -->
        <input type="file" id="inGallery" class="file-input" accept="image/*" multiple />
        <input type="file" id="inCamera" class="file-input" accept="image/*" capture="environment" />
      </div>

      <!-- Type (searchable select) -->
      <div class="field">
        <span class="field__label">Tovar turi</span>
        <div class="select-row">
          <button type="button" class="select" id="typeSelect">
            <span class="select__value" id="typeValue">akb</span>
            <svg viewBox="0 0 24 24" class="select__chev"><path d="m7 10 5 5 5-5z"/></svg>
          </button>
          <button type="button" class="icon-btn" id="typePencil" aria-label="O'zingiz kiriting">
            <svg viewBox="0 0 24 24" class="ic"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25ZM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83Z"/></svg>
          </button>
        </div>
      </div>

      <!-- Coefficient -->
      <div class="field">
        <span class="field__label">Koeffitsient</span>
        <div class="chips" id="coefChips">
          <button type="button" class="chip is-active" data-mode="none" data-value="0">Ayirilmasin</button>
          <button type="button" class="chip" data-mode="fixed" data-value="0.94">0.94</button>
          <button type="button" class="chip" data-mode="fixed" data-value="1.22">1.22</button>
          <button type="button" class="chip" data-mode="custom">O'zim kiritaman</button>
        </div>
        <div class="custom-coef" id="coefCustomWrap" hidden>
          <input
            type="text"
            inputmode="decimal"
            class="input"
            id="coefCustom"
            aria-label="Koeffitsient qiymati"
            placeholder="Masalan: 1.05"
          />
        </div>
      </div>

      <!-- Weight -->
      <div class="field">
        <label class="field__label" for="weight">Og'irlik</label>
        <div class="input-suffix">
          <input
            type="text"
            inputmode="decimal"
            class="input"
            id="weight"
            placeholder="0"
          />
          <span class="suffix">kg</span>
        </div>
      </div>

      <!-- Single Save button (works in Telegram WebView and browser alike) -->
      <button type="button" class="btn btn--primary save-btn" id="saveBtn">
        Saqlash
      </button>
    </section>

    <!-- ============ TAB 2: ADASHGAN YUKLAR ============ -->
    <section class="panel" id="panel-lost" role="tabpanel" hidden>
      <!-- From type (subtract) -->
      <div class="field">
        <span class="field__label">Qaysi turdan ayirish</span>
        <button type="button" class="select" id="adjFromSelect">
          <span class="select__value select__value--muted" id="adjFromValue">Tanlang</span>
          <svg viewBox="0 0 24 24" class="select__chev"><path d="m7 10 5 5 5-5z"/></svg>
        </button>
        <p class="bal-line" id="adjFromBal"></p>
      </div>

      <div class="transfer-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 4v13m0 0-5-5m5 5 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>

      <!-- To type (add) -->
      <div class="field">
        <span class="field__label">Qaysi turga qo'shish</span>
        <button type="button" class="select" id="adjToSelect">
          <span class="select__value select__value--muted" id="adjToValue">Tanlang</span>
          <svg viewBox="0 0 24 24" class="select__chev"><path d="m7 10 5 5 5-5z"/></svg>
        </button>
        <p class="bal-line" id="adjToBal"></p>
      </div>

      <!-- Weight -->
      <div class="field">
        <label class="field__label" for="adjWeight">Og'irlik</label>
        <div class="input-suffix">
          <input type="text" inputmode="decimal" class="input" id="adjWeight" placeholder="0" />
          <span class="suffix">kg</span>
        </div>
      </div>

      <button type="button" class="btn btn--primary save-btn" id="adjSaveBtn">Saqlash</button>

      <!-- Current stock (each tovar turi separately) -->
      <div class="field">
        <span class="field__label">Ombor holati</span>
        <div class="balances" id="balances"></div>
      </div>
    </section>
  </main>

  <!-- Bottom sheet for searchable select -->
  <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
  <div class="sheet" id="sheet" hidden role="dialog" aria-modal="true" aria-label="Tovar turi">
    <div class="sheet__grip" id="sheetGrip"><span class="sheet__handle" aria-hidden="true"></span></div>
    <div class="sheet__top">
      <span class="sheet__title" id="sheetTitle">Tovar turi</span>
      <button type="button" class="sheet__close" id="sheetClose" aria-label="Yopish">
        <svg viewBox="0 0 24 24" class="ic"><path d="M18.3 5.7 12 12l-6.3-6.3-1.4 1.4L10.6 13.4 4.3 19.7l1.4 1.4L12 14.8l6.3 6.3 1.4-1.4-6.3-6.3 6.3-6.3z"/></svg>
      </button>
    </div>
    <div class="sheet__search">
      <svg viewBox="0 0 24 24" class="ic"><path d="M10 18a8 8 0 1 1 5.3-2l5.4 5.3-1.4 1.4-5.3-5.4A8 8 0 0 1 10 18Zm0-2a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z"/></svg>
      <input type="text" id="sheetInput" class="sheet__input" placeholder="Qidirish yoki yangi tur kiriting" />
    </div>
    <ul class="sheet__list" id="sheetList"></ul>
  </div>

  <div class="toast" id="toast" hidden></div>

  <!-- Faolligim (activity log) -->
  <div class="screen" id="activityScreen" hidden>
    <header class="screen__top">
      <span class="screen__title">Faolligim</span>
      <button type="button" class="sheet__close" id="activityClose" aria-label="Yopish">
        <svg viewBox="0 0 24 24" class="ic"><path d="M18.3 5.7 12 12 5.7 5.7 4.3 7.1 10.6 13.4 4.3 19.7l1.4 1.4L12 14.8l6.3 6.3 1.4-1.4-6.3-6.3 6.3-6.3z"/></svg>
      </button>
    </header>
    <div class="filter-bar">
      <button type="button" class="filter-nav" id="actPrev" aria-label="Oldingi kun">
        <svg viewBox="0 0 24 24" class="ic"><path d="m15 6-6 6 6 6 1.4-1.4L11.8 12l4.6-4.6z"/></svg>
      </button>
      <input type="date" class="filter-date" id="actDate" />
      <button type="button" class="filter-nav" id="actNext" aria-label="Keyingi kun">
        <svg viewBox="0 0 24 24" class="ic"><path d="m9 6 6 6-6 6-1.4-1.4L12.2 12 7.6 7.4z"/></svg>
      </button>
    </div>
    <div class="screen__body" id="activityList"></div>
  </div>

  <!-- Browser login (username/password). Never shown inside Telegram. -->
  <div class="login" id="loginScreen" hidden>
    <div class="login__card">
      <div class="login__logo">
        <svg viewBox="0 0 24 24"><path d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5Zm3 8H9V6a3 3 0 0 1 6 0v3Zm-3 5a2 2 0 0 1 1 3.7V21h-2v-3.3A2 2 0 0 1 12 14Z"/></svg>
      </div>
      <h1 class="login__title">Reys hisoboti</h1>
      <p class="login__sub">Davom etish uchun tizimga kiring</p>
      <div class="login__passkey" id="passkeyLoginWrap" hidden>
        <button type="button" class="btn btn--primary" id="passkeyLoginBtn">
          <svg viewBox="0 0 24 24" class="ic"><path d="M14 2a6 6 0 0 0-5.6 8.2L2 16.6V22h5.4l1.2-1.2 1.4-1.4-1.2-1.2 1.6-1.6 1.4 1.4 1.6-1.6A6 6 0 1 0 14 2Zm2.5 5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/></svg>
          Passkey bilan kirish
        </button>
        <div class="login__or"><span>yoki</span></div>
      </div>
      <form class="login__form" id="loginForm" autocomplete="on" novalidate>
        <input
          type="text" id="loginUser" class="input"
          placeholder="Foydalanuvchi nomi"
          autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false"
          required
        />
        <div class="input-suffix">
          <input
            type="password" id="loginPass" class="input"
            placeholder="Parol" autocomplete="current-password" required
          />
          <button type="button" class="pass-toggle" id="passToggle" aria-label="Parolni ko'rsatish">
            <svg viewBox="0 0 24 24" class="ic"><path d="M12 5c-5 0-9 4.5-10 7 1 2.5 5 7 10 7s9-4.5 10-7c-1-2.5-5-7-10-7Zm0 11.5A4.5 4.5 0 1 1 12 7.5a4.5 4.5 0 0 1 0 9Zm0-2a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/></svg>
          </button>
        </div>
        <button type="submit" class="btn btn--primary" id="loginSubmit">Kirish</button>
      </form>
      <p class="login__error" id="loginError" hidden></p>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
